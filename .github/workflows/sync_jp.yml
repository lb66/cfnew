name: Sync Upstream and Deploy to CF Worker[JP]

on:
  schedule:
    - cron: "57 5 * * *"   # еМЧдЇђжЧґйЧі жѓПе§©13:57
  workflow_dispatch:       # еПѓжЙЛеК®иІ¶еПС

permissions:
  contents: write
  actions: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          set -e
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/JiangZhiyan00/cfnew.git
          git fetch upstream main

      - name: Check for upstream changes
        id: check
        run: |
          set -e
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "вЬЕ No new commits from upstream."
            echo "upstream_changed=false" >> $GITHUB_OUTPUT
          else
            echo "вђЖпЄП Found new commits, syncing..."
            echo "upstream_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream changes (safe file backup)
        if: steps.check.outputs.upstream_changed == 'true'
        run: |
          set -e
          echo "рЯФД Syncing upstream changes but keeping local workflows..."
          
          git fetch upstream main
          git checkout main
          
          # дЄіжЧґе§Здїљ workflow
          mkdir -p /tmp/workflows_backup
          cp -r .github/workflows/* /tmp/workflows_backup/ || true
          
          git reset --hard upstream/main
          
          # жБҐе§Н workflow
          mkdir -p .github/workflows
          cp -r /tmp/workflows_backup/* .github/workflows/ || true
          
          git add .github/workflows || true
          git commit -m "Preserve local workflows after upstream sync" || true

      - name: Push changes back to fork
        if: steps.check.outputs.upstream_changed == 'true'
        run: |
          set -e
          echo "вЪЩпЄП Forcing push to fork..."
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force

      - name: Deploy to Cloudflare Worker
        if: steps.check.outputs.upstream_changed == 'true'
        run: |
          set -e
          FILE_PATH="е∞Сеєідљ†зЫЄдњ°еЕЙеРЧ"

          if [ ! -f "$FILE_PATH" ]; then
            echo "вЭМ Source file not found: $FILE_PATH"
            exit 1
          fi

          echo "вЬЕ Found source file: $FILE_PATH"
          
          cp "$FILE_PATH" index.js
          
          # еИЫеїЇеМЕеРЂ KV зїСеЃЪеТМзОѓеҐГеПШйЗПзЪД wrangler.toml
          cat > wrangler.toml <<EOF
          name = "${{ secrets.CF_WORKER_NAME }}"
          main = "index.js"
          compatibility_date = "2026-01-20"
          account_id = "${{ secrets.CF_ACCOUNT_ID }}"

          # KV еСљеРНз©ЇйЧізїСеЃЪ
          [[kv_namespaces]]
          binding = "C"               # KV зїСеЃЪеПШйЗПеРНзІ∞
          id = "${{ vars.FREE_KV_ID }}"  # KV еСљеРНз©ЇйЧі ID

          # зОѓеҐГеПШйЗП
          [vars]
          u = "${{ vars.u }}"
          ev = "yes"         # еРѓзФ® vless
          et = "yes"         # еРѓзФ® trojan
          ex = "yes"         # еРѓеК® xhttp
          wk = "JP"          # еЬ∞еМЇ
          ech = "yes"        # еРѓзФ®ECH
          dkby = "yes"       # дїЕTLSиКВзВє
          ispMobile = "yes"  # еРѓзФ®зІїеК®еОЯзФЯip
          ispUnicom = "yes"  # еРѓзФ®иБФйАЪеОЯзФЯip
          ispTelecom = "yes" # еРѓзФ®зФµдњ°еОЯзФЯip
          rm = "no"          # еЕ≥йЧ≠еЬ∞еМЇеМєйЕН
          # дЉШйАЙipеИЧи°®
          yx = "103.21.244.35:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.35:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.18.168.241:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.253.74:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.25.39.43:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.72.229:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.96.106:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.221.99:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.19.169.31:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.24.53.129:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.139:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.161:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.28:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.249:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.19.62.89:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.46:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.19.143.204:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.248:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.19.47.222:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.20.5.183:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.19.255.241:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.17.230.52:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.18.2.230:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.145:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.33.195:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.215.221:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.17.184.226:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.18.12.124:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.39:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.24.67.110:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.24.202.173:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.17.120.33:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.21.202.41:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.25.217.45:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.24.208.7:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.36:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.105.47:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.16.79.70:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.85:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.203:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.18.237.211:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.19.100.167:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.135:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.17.90.195:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.177:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.24.176.26:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.21.34.44:443#рЯЗѓрЯЗµ дЄЬдЇђ,104.18.170.248:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.141:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.149:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.175:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.101:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.10:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.137:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.0:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.199:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.98:443#рЯЗѓрЯЗµ дЄЬдЇђ,103.21.244.120:443#рЯЗѓрЯЗµ дЄЬ